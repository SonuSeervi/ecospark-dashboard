<!DOCTYPE html>
<html>
<head>
    <title>Energy Chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-y: auto;
            font-family: sans-serif;
            background: #f5f5f5;
        }

        .chart-container {
            width: 95%;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h3 {
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <h3>📈 Weekly Usage Trend</h3>
        <canvas id="usageChart"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('usageChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Energy Usage (kWh)',
                    data: [8.5, 10.2, 12.5, 9.8, 11.3, 13.2, 12.8],
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#4CAF50',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true,
                        ticks: { callback: (value) => value + ' kWh' }
                    }
                }
            }
        });
    </script>

</body>
</html>
